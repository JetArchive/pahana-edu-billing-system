<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Management - Pahana Edu Bookshop</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Pahana Edu Bookshop</h1>
            <div class="user-info">
                <span id="username"></span>
                <a href="auth" class="btn">Logout</a>
            </div>
        </header>
        
        <main>
            <nav class="sidebar">
                <ul>
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li><a href="customer.html">Customer Management</a></li>
                    <li><a href="item.html" class="active">Item Management</a></li>
                    <li><a href="bill.html">Billing System</a></li>
                    <li><a href="help.html">Help</a></li>
                </ul>
            </nav>
            
            <section class="content">
                <h2>Item Management</h2>
                
                <div class="tabs">
                    <button class="tab-btn active" onclick="showTab('add-item')">Add Item</button>
                    <button class="tab-btn" onclick="showTab('view-items')">View Items</button>
                    <button class="tab-btn" onclick="showTab('edit-item')">Edit Item</button>
                </div>
                
                <div id="add-item" class="tab-content">
                    <form id="add-item-form">
                        <div class="form-group">
                            <label for="itemName">Item Name:</label>
                            <input type="text" id="itemName" name="name" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="itemDescription">Description:</label>
                            <textarea id="itemDescription" name="description"></textarea>
                        </div>
                        
                        <div class="form-group">
                            <label for="pricePerUnit">Price Per Unit:</label>
                            <input type="number" id="pricePerUnit" name="pricePerUnit" step="0.01" min="0" required>
                        </div>
                        
                        <button type="submit" class="btn">Add Item</button>
                    </form>
                </div>
                
                <div id="view-items" class="tab-content" style="display: none;">
                    <div class="search-container">
                        <input type="text" id="item-search" placeholder="Search by item name">
                        <button id="item-search-btn" class="btn">Search</button>
                    </div>
                    
                    <table id="item-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Description</th>
                                <th>Price Per Unit</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td colspan="5">Loading item data...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <div id="edit-item" class="tab-content" style="display: none;">
                    <div class="form-group">
                        <label for="edit-item-id">Item ID:</label>
                        <input type="number" id="edit-item-id">
                        <button id="load-item-btn" class="btn">Load Item</button>
                    </div>
                    
                    <form id="edit-item-form" style="display: none;">
                        <div class="form-group">
                            <label for="edit-item-name">Item Name:</label>
                            <input type="text" id="edit-item-name" name="name" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="edit-item-description">Description:</label>
                            <textarea id="edit-item-description" name="description"></textarea>
                        </div>
                        
                        <div class="form-group">
                            <label for="edit-price-per-unit">Price Per Unit:</label>
                            <input type="number" id="edit-price-per-unit" name="pricePerUnit" step="0.01" min="0" required>
                        </div>
                        
                        <button type="submit" class="btn">Update Item</button>
                    </form>
                </div>
            </section>
        </main>
        
        <footer>
            <p>&copy; 2025 Pahana Edu Bookshop. All rights reserved.</p>
        </footer>
    </div>
    
    <script src="js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
            loadItemData();
            
            // Add item form submission
            document.getElementById('add-item-form').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const formData = new FormData(this);
                const data = Object.fromEntries(formData);
                
                fetch('items', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams(data)
                })
                .then(response => {
                    if (response.status === 201) {
                        alert('Item added successfully!');
                        this.reset();
                        loadItemData();
                    } else {
                        alert('Error adding item. Please try again.');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Error adding item. Please try again.');
                });
            });
            
            // Edit item form submission
            document.getElementById('edit-item-form').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const formData = new FormData(this);
                const data = Object.fromEntries(formData);
                data.id = document.getElementById('edit-item-id').value;
                
                fetch('items', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams(data)
                })
                .then(response => {
                    if (response.status === 200) {
                        alert('Item updated successfully!');
                        this.reset();
                        document.getElementById('edit-item-form').style.display = 'none';
                        loadItemData();
                    } else {
                        alert('Error updating item. Please try again.');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Error updating item. Please try again.');
                });
            });
            
            // Load item button
            document.getElementById('load-item-btn').addEventListener('click', function() {
                const itemId = document.getElementById('edit-item-id').value;
                
                fetch(`items?id=${itemId}`)
                .then(response => {
                    if (response.ok) {
                        return response.json();
                    } else {
                        throw new Error('Item not found');
                    }
                })
                .then(items => {
                    if (items.length > 0) {
                        const item = items[0];
                        document.getElementById('edit-item-name').value = item.name;
                        document.getElementById('edit-item-description').value = item.description;
                        document.getElementById('edit-price-per-unit').value = item.pricePerUnit;
                        document.getElementById('edit-item-form').style.display = 'block';
                    } else {
                        throw new Error('Item not found');
                    }
                })
                .catch(error => {
                    alert('Item not found. Please check the item ID.');
                    console.error('Error:', error);
                });
            });
            
            // Search functionality
            document.getElementById('item-search-btn').addEventListener('click', function() {
                const searchTerm = document.getElementById('item-search').value.toLowerCase();
                filterItemTable(searchTerm);
            });
            
            document.getElementById('item-search').addEventListener('keyup', function() {
                const searchTerm = this.value.toLowerCase();
                filterItemTable(searchTerm);
            });
        });
        
        function loadItemData() {
            fetch('items')
                .then(response => response.json())
                .then(data => {
                    const tableBody = document.querySelector('#item-table tbody');
                    tableBody.innerHTML = '';
                    
                    if (data.length === 0) {
                        tableBody.innerHTML = '<tr><td colspan="5">No items found</td></tr>';
                        return;
                    }
                    
                    data.forEach(item => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${item.id}</td>
                            <td>${item.name}</td>
                            <td>${item.description}</td>
                            <td>${item.pricePerUnit}</td>
                            <td>
                                <button class="btn-small" onclick="deleteItem(${item.id})">Delete</button>
                            </td>
                        `;
                        tableBody.appendChild(row);
                    });
                })
                .catch(error => {
                    console.error('Error loading items:', error);
                    document.querySelector('#item-table tbody').innerHTML = 
                        '<tr><td colspan="5">Error loading item data</td></tr>';
                });
        }
        
        function filterItemTable(searchTerm) {
            const tableRows = document.querySelectorAll('#item-table tbody tr');
            
            tableRows.forEach(row => {
                const name = row.cells[1].textContent.toLowerCase();
                
                if (name.includes(searchTerm)) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        }
        
        function deleteItem(itemId) {
            if (confirm('Are you sure you want to delete this item?')) {
                fetch(`items?id=${itemId}`, {
                    method: 'DELETE'
                })
                .then(response => {
                    if (response.status === 200) {
                        alert('Item deleted successfully!');
                        loadItemData();
                    } else {
                        alert('Error deleting item. Please try again.');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Error deleting item. Please try again.');
                });
            }
        }
        
        function showTab(tabId) {
            // Hide all tab contents
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.style.display = 'none';
            });
            
            // Remove active class from all tab buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Show selected tab
            document.getElementById(tabId).style.display = 'block';
            
            // Add active class to clicked button
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
